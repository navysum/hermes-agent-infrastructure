name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks (full history scan)
        # Direct CLI scan of the whole repo history. Avoids the marketplace
        # action's push-range logic, which breaks on force-pushed/rewritten
        # history (an invalid `<root>^` revision). Exits non-zero only on a
        # real finding.
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo --redact --verbose --no-banner

  syntax:
    name: Syntax check (python + bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax (py_compile)
        run: |
          fail=0
          while IFS= read -r f; do
            python -m py_compile "$f" || fail=1
          done < <(find scripts ops -name '*.py')
          exit $fail
      - name: Bash syntax (bash -n)
        run: |
          fail=0
          while IFS= read -r f; do
            bash -n "$f" || fail=1
          done < <(find scripts ops -name '*.sh')
          exit $fail
