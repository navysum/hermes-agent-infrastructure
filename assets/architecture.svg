<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 680" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#ef4444"/>
    </marker>
    <style>
      .lbl  { fill:#94a3b8; font-size:11px; font-weight:700; letter-spacing:1.5px; }
      .box  { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.2; }
      .t    { fill:#1e293b; font-size:13px; font-weight:600; }
      .ts   { fill:#64748b; font-size:11px; font-weight:400; }
      .edge { stroke:#94a3b8; stroke-width:1.6; fill:none; }
    </style>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="924" height="664" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- header -->
  <text x="32" y="46" fill="#0f172a" font-size="23" font-weight="800">Hermes Agent Infrastructure</text>
  <text x="32" y="68" class="ts" font-size="12.5">Self-hosted AI agent · hybrid model routing · automation · secure integrations</text>

  <!-- ===== CLIENTS ===== -->
  <text x="32" y="104" class="lbl">CLIENTS</text>
  <rect class="box" x="120" y="112" width="170" height="46" rx="9"/>
  <text x="205" y="140" class="t" text-anchor="middle">Telegram</text>
  <rect class="box" x="312" y="112" width="268" height="46" rx="9"/>
  <text x="446" y="134" class="t" text-anchor="middle">Private Dashboard</text>
  <text x="446" y="150" class="ts" text-anchor="middle">Tailscale network only</text>

  <!-- watchdog (top-right) -->
  <rect x="640" y="112" width="270" height="46" rx="9" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="775" y="134" class="t" text-anchor="middle" fill="#b91c1c">self_heal · watchdog</text>
  <text x="775" y="150" class="ts" text-anchor="middle" fill="#ef4444">keep-alive + automatic failover</text>

  <!-- ===== HERMES CORE ===== -->
  <text x="32" y="200" class="lbl">HERMES CORE · systemd</text>
  <rect x="120" y="210" width="190" height="56" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.3"/>
  <text x="215" y="234" class="t" text-anchor="middle">Gateway</text>
  <text x="215" y="251" class="ts" text-anchor="middle">receive + cron scheduler</text>

  <rect x="360" y="210" width="250" height="56" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.3"/>
  <text x="485" y="234" class="t" text-anchor="middle">Agent Loop</text>
  <text x="485" y="251" class="ts" text-anchor="middle">personas · skills · tools / MCP</text>

  <rect x="660" y="210" width="200" height="56" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.3"/>
  <text x="760" y="234" class="t" text-anchor="middle">Model Router</text>
  <text x="760" y="251" class="ts" text-anchor="middle">cloud-first + fallback</text>

  <!-- ===== MODELS ===== -->
  <text x="32" y="312" class="lbl">MODELS</text>
  <rect x="120" y="322" width="430" height="56" rx="9" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.3"/>
  <text x="335" y="346" class="t" text-anchor="middle">Cloud LLMs</text>
  <text x="335" y="363" class="ts" text-anchor="middle">OpenAI / Codex · Anthropic · OpenRouter · Gemini</text>

  <rect x="600" y="322" width="260" height="56" rx="9" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.3"/>
  <text x="730" y="346" class="t" text-anchor="middle">Local LLM</text>
  <text x="730" y="363" class="ts" text-anchor="middle">Ollama qwen3:8b · cheap / offline</text>

  <!-- ===== AUTOMATION ===== -->
  <text x="32" y="424" class="lbl">AUTOMATION · cron</text>
  <rect x="120" y="434" width="320" height="56" rx="9" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="280" y="458" class="t" text-anchor="middle">Deterministic jobs</text>
  <text x="280" y="475" class="ts" text-anchor="middle">run script · alert on output · dedup</text>

  <rect x="490" y="434" width="370" height="56" rx="9" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="675" y="458" class="t" text-anchor="middle">Agentic jobs</text>
  <text x="675" y="475" class="ts" text-anchor="middle">morning brief · nightly reflect (LLM-generated)</text>

  <!-- ===== INTEGRATIONS ===== -->
  <text x="32" y="536" class="lbl">INTEGRATIONS · read-only where money / health</text>
  <g>
    <rect class="box" x="120" y="546" width="150" height="48" rx="9"/>
    <text x="195" y="568" class="t" text-anchor="middle" font-size="12.5">OANDA FX</text>
    <text x="195" y="583" class="ts" text-anchor="middle">read-only</text>
    <rect class="box" x="286" y="546" width="120" height="48" rx="9"/>
    <text x="346" y="575" class="t" text-anchor="middle" font-size="12.5">Whoop</text>
    <rect class="box" x="422" y="546" width="120" height="48" rx="9"/>
    <text x="482" y="575" class="t" text-anchor="middle" font-size="12.5">Notion</text>
    <rect class="box" x="558" y="546" width="150" height="48" rx="9"/>
    <text x="633" y="575" class="t" text-anchor="middle" font-size="12.5">iCloud CalDAV</text>
    <rect class="box" x="724" y="546" width="136" height="48" rx="9"/>
    <text x="792" y="575" class="t" text-anchor="middle" font-size="12.5">Composio MCP</text>
  </g>

  <!-- ===== EDGES ===== -->
  <!-- clients -> gateway -->
  <path class="edge" d="M205,158 L205,210" marker-end="url(#arrow)"/>
  <path class="edge" d="M446,158 L446,188 L240,188 L240,210" marker-end="url(#arrow)"/>
  <!-- gateway -> agent -> router -->
  <path class="edge" d="M310,238 L360,238" marker-end="url(#arrow)"/>
  <path class="edge" d="M610,238 L660,238" marker-end="url(#arrow)"/>
  <!-- router -> models -->
  <path class="edge" d="M760,266 L760,300 L335,300 L335,322" marker-end="url(#arrow)"/>
  <path class="edge" d="M760,266 L760,322" marker-end="url(#arrow)"/>
  <!-- gateway(cron) -> automation -->
  <path class="edge" d="M200,266 L200,408 L280,408 L280,434" marker-end="url(#arrow)"/>
  <path class="edge" d="M225,266 L225,400 L675,400 L675,434" marker-end="url(#arrow)"/>
  <!-- agent -> integrations -->
  <path class="edge" d="M485,266 L485,316 L905,316 L905,520 L792,520 L792,546" marker-end="url(#arrow)"/>
  <!-- automation -> integrations -->
  <path class="edge" d="M280,490 L280,522 L195,522 L195,546" marker-end="url(#arrow)"/>
  <!-- watchdog -> core (failover, dashed red) -->
  <path stroke="#ef4444" stroke-width="1.6" fill="none" stroke-dasharray="5 4" d="M700,158 L700,182 L300,182 L300,206" marker-end="url(#arrowR)"/>

  <!-- security footer -->
  <rect x="120" y="616" width="740" height="40" rx="9" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="490" y="641" text-anchor="middle" font-size="12" fill="#475569">
    🔒  Secrets in <tspan font-weight="700">.env</tspan> (git-ignored) · read-only money/health · command allowlist + approvals · private-network dashboard
  </text>
</svg>
